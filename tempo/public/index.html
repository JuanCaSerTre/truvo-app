<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <!--
      The `content` is stamped at runtime by the tempo-sdk Expo Babel plugin
      (which writes this machine's absolute sidecar root into the live DOM). It
      is intentionally left empty here so this committed file holds no
      machine-specific path. The empty marker still satisfies the dev server's
      tempo-host readiness check, which greps the served HTML for the attribute
      name (`tempo-devserver.ts` `isTempoHostDocument`).
    -->
    <meta name="tempo-project-root" content="" />
    <title>%WEB_TITLE%</title>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
